<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Draw Host</title>
<style>
  :root{
    --bg:#060309; --panel:#140b22; --panel2:#0d0716; --border:#2d1c46;
    --gold:#9b5cff; --goldLight:#cba3ff; --cyan:#34e0ff; --text:#f1ecfb; --muted:#a99bd1;
    --err:#f4433f; --ok:#4ade80;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    background:radial-gradient(circle at top,#2a1345,var(--bg) 60%);
    color:var(--text); min-height:100vh; padding:24px;
  }
  .wrap{max-width:720px;margin:0 auto;}
  .center-card{
    max-width:400px;margin:80px auto;background:var(--panel);border:1px solid var(--border);
    border-radius:16px;padding:32px;text-align:center;
  }
  h1{font-size:1.3rem;margin:0 0 20px;color:var(--cyan);}
  h2{font-size:1.05rem;margin:0 0 14px;color:var(--cyan);}
  input, textarea{
    width:100%;background:var(--panel2);border:1px solid var(--border);color:var(--text);
    border-radius:8px;padding:10px 12px;font-size:0.9rem;margin-bottom:10px;font-family:inherit;
  }
  textarea{min-height:90px;resize:vertical;}
  button{
    background:linear-gradient(180deg,var(--goldLight),var(--gold));color:#fbf7ff;
    border:none;font-weight:800;padding:12px 20px;border-radius:10px;font-size:0.92rem;cursor:pointer;
    letter-spacing:.03em;
  }
  button:hover:not(:disabled){filter:brightness(1.08);}
  button:disabled{opacity:0.45;cursor:default;}
  button.secondary{background:transparent;color:var(--gold);border:1px solid var(--gold);}
  .status{margin-top:8px;font-size:0.85rem;min-height:1.2em;}
  .status.ok{color:var(--ok);} .status.err{color:var(--err);} .status.muted{color:var(--muted);}
  .panel{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:20px;}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;color:var(--muted);font-size:0.85rem;}
  .admin-nav{margin:-6px 0 20px;font-size:0.85rem;}
  .admin-nav a{color:var(--cyan);font-weight:700;text-decoration:none;}
  .admin-nav a:hover{text-decoration:underline;}
  .blur-toggle{filter:blur(6px);transition:filter .15s ease;cursor:pointer;}
  .blur-toggle:hover{filter:blur(0);}
  .signout-dock{display:flex;justify-content:center;margin-top:32px;padding-top:16px;border-top:1px solid var(--border);}
  .signout-dock button{opacity:0.6;font-size:0.8rem;padding:8px 16px;}
  .signout-dock button:hover{opacity:1;}
  .history-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .history-head h2{margin:0;}
  .history-count{color:var(--muted);font-size:0.8rem;}
  .history-list{max-height:300px;overflow-y:auto;padding-right:6px;}
  .history-list::-webkit-scrollbar{width:8px;}
  .history-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px;}
  .history-list::-webkit-scrollbar-track{background:transparent;}
  .history-day-label{
    position:sticky;top:0;background:var(--panel);color:var(--cyan);font-size:0.72rem;
    text-transform:uppercase;letter-spacing:.06em;font-weight:800;padding:6px 2px;z-index:1;
  }
  .history-row{display:flex;align-items:center;gap:10px;padding:8px 4px;border-bottom:1px solid var(--border);}
  .history-avatar{
    width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:1.15rem;flex-shrink:0;
  }
  .history-main{flex:1;min-width:0;}
  .history-id{font-weight:700;color:var(--goldLight);font-size:0.9rem;}
  .history-prize{color:var(--muted);font-size:0.8rem;}
  .history-time{color:var(--muted);font-size:0.75rem;flex-shrink:0;white-space:nowrap;}
  .history-empty{color:var(--muted);font-size:0.85rem;text-align:center;padding:14px 0;}
  .wl-status-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
  .wl-chip{
    display:flex;align-items:center;gap:6px;border:1px solid var(--border);
    padding:6px 12px;border-radius:20px;font-size:0.82rem;background:var(--panel2);
  }
  .wl-chip.done{border-color:var(--ok);color:var(--ok);}
  .wl-chip.pending{border-color:var(--err);color:var(--err);}
  /* --- horizontal spinning reels (CS:GO-style) --- */
  .reel{
    width:100%;max-width:660px;height:150px;overflow:hidden;border:2px solid var(--border);border-radius:12px;
    background:var(--panel2);position:relative;margin:0 auto 16px;
  }
  .reel-label{text-align:center;color:var(--muted);font-size:0.72rem;text-transform:uppercase;letter-spacing:.08em;margin:0 0 6px;font-weight:700;}
  #rollBtn{display:block;margin:8px auto 0;padding:14px 40px;font-size:1rem;}
  /* center ticker line */
  .reel::before{
    content:"";position:absolute;left:50%;top:0;bottom:0;width:3px;margin-left:-1.5px;z-index:3;
    background:linear-gradient(180deg,var(--cyan),var(--gold));box-shadow:0 0 10px var(--cyan);
  }
  /* edge fade */
  .reel::after{
    content:"";position:absolute;inset:0;z-index:2;pointer-events:none;border-radius:10px;
    box-shadow:inset 46px 0 40px -24px var(--panel2), inset -46px 0 40px -24px var(--panel2),
               inset 0 10px 10px -8px #000, inset 0 -10px 10px -8px #000;
  }
  .reel-track{display:flex;flex-direction:row;height:100%;will-change:transform;}
  .reel-item{
    flex:0 0 116px;width:116px;height:100%;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:6px;padding:8px;
  }
  .reel-item .slot-card{
    width:100%;flex:1;border:1px solid var(--border);border-radius:10px;background:var(--panel);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:6px;
  }
  .reel-item.final .slot-card{border-color:var(--gold);box-shadow:0 0 14px rgba(155,92,255,.5);}
  .avatar-circle{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2rem;flex-shrink:0;}
  .avatar-id{font-size:0.72rem;font-weight:700;color:var(--goldLight);text-align:center;word-break:break-all;line-height:1.1;}
  .prize-icon{transform:scale(2);transform-origin:center;height:24px;display:flex;align-items:center;}
  .prize-label{font-size:0.78rem;font-weight:800;color:var(--text);text-align:center;}
  @keyframes reelLandPulse{
    0%{box-shadow:0 0 0 0 rgba(155,92,255,.65);}
    70%{box-shadow:0 0 0 16px rgba(155,92,255,0);}
    100%{box-shadow:0 0 0 0 rgba(155,92,255,0);}
  }
  @keyframes reelLandBounce{
    0%{transform:scale(1);} 45%{transform:scale(1.045);} 100%{transform:scale(1);}
  }
  .reel.landed{animation:reelLandPulse .65s ease-out, reelLandBounce .4s ease-out;}
  .result-box{
    margin-top:18px;background:var(--panel2);border:1px solid var(--border);border-radius:10px;
    padding:16px;text-align:center;
  }
  .result-box .label{color:var(--muted);font-size:0.78rem;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;}
  .result-box .value{font-size:1.2rem;font-weight:800;color:var(--goldLight);}
  .result-box a{display:inline-block;margin-top:12px;color:var(--cyan);font-weight:700;text-decoration:none;}
  .battle-cases-grid{display:flex;flex-wrap:wrap;gap:12px;}
  .battle-case-card{
    width:130px;height:150px;border:2px solid var(--border);border-radius:12px;overflow:hidden;
    background:var(--panel);
  }
  .battle-case-card img{width:100%;height:100%;object-fit:contain;display:block;}
  /* --- win modal --- */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(4,3,9,.82);backdrop-filter:blur(3px);
    display:none;align-items:center;justify-content:center;z-index:100;padding:20px;
  }
  .modal-overlay.show{display:flex;}
  .modal-card{
    background:var(--panel);border:1px solid var(--gold);border-radius:18px;padding:26px 28px;
    max-width:480px;width:100%;text-align:center;box-shadow:0 0 44px rgba(155,92,255,.45);
    max-height:90vh;overflow-y:auto;animation:modalPop .28s ease;
  }
  @keyframes modalPop{0%{transform:scale(.9);opacity:0;}100%{transform:scale(1);opacity:1;}}
  .modal-close{float:right;background:transparent;border:none;color:var(--muted);font-size:1.5rem;line-height:1;cursor:pointer;padding:0;}
  .modal-close:hover{color:var(--text);}
  .modal-sub{color:var(--cyan);font-size:0.74rem;text-transform:uppercase;letter-spacing:.12em;font-weight:800;margin-bottom:14px;}
  .modal-card .avatar-circle{width:82px;height:82px;font-size:2.7rem;margin:0 auto 12px;}
  .modal-winner{font-size:1.35rem;font-weight:800;color:var(--goldLight);margin-bottom:10px;word-break:break-all;}
  .modal-prize{display:flex;align-items:center;justify-content:center;gap:12px;font-size:1.5rem;font-weight:800;color:var(--text);margin-bottom:4px;}
  .modal-prize .prize-icon{transform:scale(2.2);}
  .modal-battle{margin-top:20px;text-align:left;border-top:1px solid var(--border);padding-top:16px;}
  .modal-battle .battle-cases-grid{justify-content:center;margin-top:10px;}
  .setup-warning{
    background:#2c1a12;border:1px solid #6b4a1a;color:#f4c778;padding:14px;border-radius:10px;
    font-size:0.82rem;text-align:left;line-height:1.5;max-width:400px;margin:80px auto;
  }
</style>
</head>
<body>

  <div id="setupWarning" class="setup-warning" style="display:none;">
    Firebase isn't configured yet — fill in <code>firebase-config.js</code> first.
  </div>

  <div class="center-card" id="loginCard" style="display:none;">
    <h1>Host Login</h1>
    <input id="email" type="email" placeholder="Email" autocomplete="username">
    <input id="password" type="password" placeholder="Password" autocomplete="current-password">
    <button id="loginBtn" style="width:100%;">SIGN IN</button>
    <div id="loginStatus" class="status"></div>
  </div>

  <div class="wrap" id="dashboard" style="display:none;">
    <div class="topbar">
      <span>Signed in as <span id="whoami" class="blur-toggle"></span></span>
      <button class="secondary" id="toggleWhitelistBtn">Show Whitelist Editor</button>
    </div>

    <div class="admin-nav">
      <a href="index.html">Open Case Picker →</a>&nbsp;&nbsp;|&nbsp;&nbsp;<a href="enter.html">Open Entry Page →</a>
    </div>

    <div class="panel" id="whitelistPanel" style="display:none;">
      <h2>Weekly Whitelist</h2>
      <textarea id="whitelistBox" placeholder="One Rain ID per line or comma-separated, e.g. 7JEU96GX"></textarea>
      <button id="saveWhitelistBtn">Save Whitelist</button>
      <div id="whitelistStatus" class="status"></div>

      <h2 style="margin-top:22px;">Battle Call Status (<span id="doneCount">0</span>/<span id="totalCount">0</span> done)</h2>
      <div id="whitelistStatusList" class="wl-status-list"></div>

      <h2 style="margin-top:22px;">Reset a User's Password</h2>
      <input id="pwResetId" type="text" placeholder="Rain ID (e.g. 7JEU96GX)">
      <input id="pwResetNew" type="text" placeholder="New password">
      <button id="pwResetBtn">Set Password</button>
      <div id="pwResetStatus" class="status"></div>

      <h2 style="margin-top:22px;">Round Controls</h2>
      <button class="secondary" id="resetRoundBtn">Reset Round (clears queue &amp; passwords)</button>
      <div id="resetStatus" class="status"></div>
    </div>

    <div class="panel">
      <h2>Draw</h2>
      <p class="reel-label">Winner</p>
      <div class="reel" id="winnerReel"><div class="reel-track" id="winnerTrack"></div></div>
      <p class="reel-label">Prize</p>
      <div class="reel" id="prizeReel"><div class="reel-track" id="prizeTrack"></div></div>
      <button id="rollBtn" disabled>ROLL</button>
    </div>

    <div class="panel" id="historyPanel">
      <div class="history-head">
        <h2>Draw History</h2>
        <div style="display:flex;align-items:center;gap:12px;">
          <span class="history-count" id="historyCount"></span>
          <button class="secondary" id="clearHistoryBtn" style="font-size:0.72rem;padding:5px 12px;">Clear</button>
        </div>
      </div>
      <div class="history-list" id="historyList">
        <div class="history-empty">No draws yet.</div>
      </div>
    </div>

    <div class="signout-dock">
      <button class="secondary" id="signOutBtn">Sign out</button>
    </div>
  </div>

  <div class="modal-overlay" id="resultModal">
    <div class="modal-card">
      <button class="modal-close" id="modalCloseBtn">&times;</button>
      <div class="modal-sub">Winner</div>
      <div id="modalAvatar"></div>
      <div class="modal-winner" id="modalWinner"></div>
      <div class="modal-sub" style="color:var(--muted);margin-bottom:8px;">won</div>
      <div class="modal-prize" id="modalPrize"></div>
      <div class="modal-battle" id="modalBattle" style="display:none;">
        <div id="modalBattleNames" style="color:var(--text);font-size:0.95rem;font-weight:700;margin-bottom:6px;user-select:all;"></div>
        <div id="modalBattleMeta" style="color:var(--muted);font-size:0.85rem;margin-bottom:10px;"></div>
        <div id="modalBattleGrid" class="battle-cases-grid"></div>
      </div>
    </div>
  </div>

<script type="module">
  import { firebaseConfig, CONFIG_IS_SET } from "./firebase-config.js";
  import { ICON_FILES } from "./cases-data.js";

  if(!CONFIG_IS_SET){
    document.getElementById("setupWarning").style.display = "block";
  } else {
    const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js");
    const {
      getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut
    } = await import("https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js");
    const {
      getFirestore, doc, getDoc, setDoc, collection, onSnapshot, getDocs, deleteDoc
    } = await import("https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js");

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const loginCard = document.getElementById("loginCard");
    const dashboard = document.getElementById("dashboard");
    const loginStatus = document.getElementById("loginStatus");

    document.getElementById("loginBtn").addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      loginStatus.textContent = "Signing in...";
      loginStatus.className = "status muted";
      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (err) {
        loginStatus.textContent = "Sign-in failed — check email/password.";
        loginStatus.className = "status err";
      }
    });

    document.getElementById("signOutBtn").addEventListener("click", () => signOut(auth));

    onAuthStateChanged(auth, (user) => {
      if (user) {
        loginCard.style.display = "none";
        dashboard.style.display = "block";
        document.getElementById("whoami").textContent = user.email;
        initDashboard();
      } else {
        loginCard.style.display = "block";
        dashboard.style.display = "none";
      }
    });

    let dashboardInitialized = false;
    let currentEntries = [];
    let currentWinner = null;
    let currentWhitelist = [];
    let submittedSuffixes = new Set();
    let winnerLogged = false;

    // --- draw history (grouped by day, scrollable) ---
    function historyDayLabel(ts){
      const startOfDay = d => new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
      const then = new Date(ts), now = new Date();
      const diffDays = Math.round((startOfDay(now) - startOfDay(then)) / 86400000);
      if(diffDays === 0) return "Today";
      if(diffDays === 1) return "Yesterday";
      return then.toLocaleDateString(undefined, {
        weekday: "short", month: "short", day: "numeric",
        year: then.getFullYear() !== now.getFullYear() ? "numeric" : undefined
      });
    }

    function renderHistory(items){
      const listEl = document.getElementById("historyList");
      const countEl = document.getElementById("historyCount");
      if(!items.length){
        listEl.innerHTML = `<div class="history-empty">No draws yet.</div>`;
        countEl.textContent = "";
        return;
      }
      const todayCount = items.filter(it => historyDayLabel(it.ts) === "Today").length;
      countEl.textContent = `${todayCount} today · ${items.length} total`;

      let html = "", lastLabel = null;
      for(const it of items){
        const label = historyDayLabel(it.ts);
        if(label !== lastLabel){
          html += `<div class="history-day-label">${label}</div>`;
          lastLabel = label;
        }
        const av = avatarFor(it.rainId || "");
        const time = new Date(it.ts).toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
        html += `<div class="history-row">
          <div class="history-avatar" style="background:hsl(${av.hue},55%,42%);">${av.emoji}</div>
          <div class="history-main">
            <div class="history-id">${it.rainId || "?"}</div>
            <div class="history-prize">${it.prize || ""}</div>
          </div>
          <div class="history-time">${time}</div>
        </div>`;
      }
      listEl.innerHTML = html;
    }

    // History is stored locally on the host's machine — no backend rules needed,
    // persists across reloads and days, works the moment the page loads.
    const HISTORY_KEY = "drawHistory";
    function loadHistory(){
      try{
        const arr = JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
        return Array.isArray(arr)
          ? arr.filter(x => x && typeof x.ts === "number").sort((a, b) => b.ts - a.ts)
          : [];
      } catch { return []; }
    }
    function addHistory(entry){
      const arr = loadHistory();
      arr.unshift(entry);
      try { localStorage.setItem(HISTORY_KEY, JSON.stringify(arr.slice(0, 500))); } catch {}
      renderHistory(loadHistory()); // reload so it's always sorted newest-first
    }
    function clearHistory(){
      try { localStorage.removeItem(HISTORY_KEY); } catch {}
      renderHistory([]);
    }

    function renderWhitelistStatus(){
      const done = currentWhitelist.filter(id => submittedSuffixes.has(id)).length;
      document.getElementById("doneCount").textContent = done;
      document.getElementById("totalCount").textContent = currentWhitelist.length;
      const listEl = document.getElementById("whitelistStatusList");
      listEl.innerHTML = currentWhitelist.map(id => {
        const isDone = submittedSuffixes.has(id);
        return `<div class="wl-chip ${isDone ? "done" : "pending"}">${isDone ? "&#10003;" : "&#10007;"} RN-${id}</div>`;
      }).join("") || `<span style="color:var(--muted);font-size:0.85rem;">No whitelist loaded yet.</span>`;
    }

    function initDashboard(){
      if(dashboardInitialized) return;
      dashboardInitialized = true;

      const whitelistPanel = document.getElementById("whitelistPanel");
      const toggleBtn = document.getElementById("toggleWhitelistBtn");
      toggleBtn.addEventListener("click", () => {
        const showing = whitelistPanel.style.display !== "none";
        whitelistPanel.style.display = showing ? "none" : "block";
        toggleBtn.textContent = showing ? "Show Whitelist Editor" : "Hide Whitelist Editor";
      });

      // Load current whitelist into the textarea + status tracker
      getDoc(doc(db, "whitelist", "current")).then(snap => {
        if(snap.exists()){
          currentWhitelist = snap.data().ids || [];
          document.getElementById("whitelistBox").value = currentWhitelist.join("\n");
          renderWhitelistStatus();
        }
      });

      document.getElementById("saveWhitelistBtn").addEventListener("click", async () => {
        const raw = document.getElementById("whitelistBox").value;
        const ids = [...new Set(
          raw.split(/[\n,]/).map(s => s.trim().toUpperCase().replace(/^RN-?/, "")).filter(Boolean)
        )];
        const statusEl = document.getElementById("whitelistStatus");
        try{
          await setDoc(doc(db, "whitelist", "current"), { ids });
          statusEl.textContent = `Saved ${ids.length} IDs.`;
          statusEl.className = "status ok";
          currentWhitelist = ids;
          renderWhitelistStatus();
        } catch(err){
          statusEl.textContent = "Failed to save — try again.";
          statusEl.className = "status err";
        }
      });

      // Track submitted entries in the background (no visible feed) so Roll Winner has a pool to draw from.
      // A doc only counts as "done" if it actually has cases — mid-edit (Change Battle) docs
      // are cleared to cases:[] so they correctly show as pending here and aren't rollable yet.
      onSnapshot(collection(db, "entries"), (snapshot) => {
        const completedDocs = snapshot.docs.filter(d => Array.isArray(d.data().cases) && d.data().cases.length > 0);
        currentEntries = completedDocs.map(d => d.data().rainId);
        submittedSuffixes = new Set(completedDocs.map(d => d.id));
        if(!rolling){
          document.getElementById("rollBtn").disabled = currentEntries.length === 0;
          // keep the winner reel looping with the live entrant pool
          fillIdle(document.getElementById("winnerTrack"), currentEntries, renderWinnerCard);
        }
        renderWhitelistStatus();
      });

      idleReels(); // start the reels looping immediately

      // Draw history (local) — newest first, grouped by day in the panel above Sign out.
      renderHistory(loadHistory());
      document.getElementById("clearHistoryBtn").addEventListener("click", () => {
        if(confirm("Clear all draw history? This can't be undone.")) clearHistory();
      });

      document.getElementById("resetRoundBtn").addEventListener("click", async () => {
        const statusEl = document.getElementById("resetStatus");
        statusEl.textContent = "Clearing...";
        statusEl.className = "status muted";
        const snap = await getDocs(collection(db, "entries"));
        await Promise.all(snap.docs.map(d => deleteDoc(d.ref)));
        currentWinner = null;
        hideModal();
        document.getElementById("rollBtn").disabled = true;
        statusEl.textContent = "Queue cleared.";
        statusEl.className = "status ok";
      });

      document.getElementById("rollBtn").addEventListener("click", rollBoth);
      document.getElementById("modalCloseBtn").addEventListener("click", hideModal);
      document.getElementById("resultModal").addEventListener("click", (e) => {
        if(e.target.id === "resultModal") hideModal();
      });

      document.getElementById("pwResetBtn").addEventListener("click", async () => {
        const idRaw = document.getElementById("pwResetId").value.trim().toUpperCase().replace(/^RN-?/, "");
        const newPw = document.getElementById("pwResetNew").value;
        const statusEl = document.getElementById("pwResetStatus");
        if(!idRaw || !newPw){
          statusEl.textContent = "Enter both an ID and a new password.";
          statusEl.className = "status err";
          return;
        }
        statusEl.textContent = "Saving...";
        statusEl.className = "status muted";
        try{
          const passwordHash = await hashPassword(newPw);
          await setDoc(doc(db, "entries", idRaw), { rainId: "RN-" + idRaw, passwordHash }, { merge: true });
          statusEl.textContent = `Password reset for RN-${idRaw}.`;
          statusEl.className = "status ok";
          document.getElementById("pwResetNew").value = "";
        } catch(err){
          statusEl.textContent = "Failed — check that ID is spelled correctly and on the whitelist.";
          statusEl.className = "status err";
        }
      });
    }

    // --- secure randomness helpers ---
    function randomIndex(n){
      const buf = new Uint32Array(1);
      crypto.getRandomValues(buf);
      return buf[0] % n;
    }
    function randomFloat(){
      const buf = new Uint32Array(1);
      crypto.getRandomValues(buf);
      return buf[0] / (0xFFFFFFFF + 1);
    }
    // Actual odds (Cases removed — its weight folded into Battle Call).
    const PRIZES = [
      { label: "5 Coins", weight: 60 },
      { label: "10 Coins", weight: 20 },
      { label: "Battle Call", weight: 18 },
      { label: "25 Coins", weight: 2 },
    ];
    function pickWeightedPrize(){
      const total = PRIZES.reduce((s,p) => s + p.weight, 0);
      let r = randomFloat() * total;
      for(const p of PRIZES){
        if(r < p.weight) return p;
        r -= p.weight;
      }
      return PRIZES[PRIZES.length - 1];
    }

    // Purely visual — fills the prize reel with lots of cards so viewers see many
    // prizes scrolling by. Odds are unaffected (the winner is chosen by pickWeightedPrize).
    const PRIZE_DISPLAY_POOL = [
      ...Array(10).fill("5 Coins"),
      ...Array(8).fill("10 Coins"),
      ...Array(5).fill("25 Coins"),
      ...Array(6).fill("Battle Call"),
    ];

    function renderWinnerCard(rainId, isFinal){
      const av = avatarFor(rainId);
      return `<div class="reel-item${isFinal ? " final" : ""}">
        <div class="slot-card">
          <div class="avatar-circle" style="background:hsl(${av.hue},55%,42%);">${av.emoji}</div>
          <div class="avatar-id">${rainId}</div>
        </div>
      </div>`;
    }
    function renderPrizeCard(label, isFinal, idx){
      const isCoins = /Coins/.test(label);
      const isBattle = label === "Battle Call";
      const icon = isCoins ? coinSvg("p" + idx) : isBattle ? BATTLE_SVG : "";
      return `<div class="reel-item${isFinal ? " final" : ""}">
        <div class="slot-card">
          <div class="prize-icon">${icon}</div>
          <div class="prize-label">${label}</div>
        </div>
      </div>`;
    }

    async function hashPassword(pw){
      const enc = new TextEncoder().encode(pw);
      const buf = await crypto.subtle.digest("SHA-256", enc);
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
    }

    const AVATAR_EMOJIS = ["🐸","🦄","🐙","🎃","👻","🦊","🐵","🐺","🦁","🐯","🐨","🐼","🦝","🐲","🥷","🤡","👾","🧌","🦖","🐷","🐔","🐶","🐱","🦉","🐹","🐰"];

    // Deterministic per-person avatar: same Rain ID always gets the same emoji + color,
    // but nobody picks it themselves.
    function avatarFor(rainId){
      const suffix = rainId.replace(/^RN-/, "");
      let hash = 0;
      for(let i = 0; i < suffix.length; i++) hash = (hash * 31 + suffix.charCodeAt(i)) >>> 0;
      return { emoji: AVATAR_EMOJIS[hash % AVATAR_EMOJIS.length], hue: hash % 360 };
    }

    function coinSvg(uid){
      return `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 16 16" style="display:block;flex-shrink:0;"><path fill="url(#coinA${uid})" d="M15.907 7.433c-.587-3.567-3.904-6.3-7.907-6.3S.68 3.867.093 7.434H0v1.134C0 12.672 3.582 16 8 16s8-3.328 8-7.433V7.433z"></path><path fill="url(#coinB${uid})" d="M8 14.866c4.418 0 8-3.328 8-7.433S12.418 0 8 0 0 3.328 0 7.433s3.582 7.433 8 7.433"></path><path fill="url(#coinC${uid})" d="M8 13.372c3.53 0 6.392-2.66 6.392-5.939 0-3.28-2.862-5.939-6.392-5.939-3.53 0-6.392 2.66-6.392 5.94 0 3.279 2.862 5.938 6.392 5.938"></path><path fill="url(#coinD${uid})" d="M8 2.116c3.418 0 6.21 2.492 6.383 5.628.006-.103.009-.207.009-.31 0-3.28-2.862-5.94-6.392-5.94-3.53 0-6.392 2.66-6.392 5.94 0 .103.003.207.01.31C1.79 4.608 4.581 2.116 8 2.116"></path><path fill="url(#coinE${uid})" d="M4.754 7.943c-.213-.029-.417-.222-.374-.44l.047-.203a.505.505 0 0 1 .053-.151c.061-.1.156-.147.293-.16l1.085-.161c1.87-.138 1.672-1.044 1.946-1.744l.432-1.294c.038-.175.146-.274.336-.274H8.9c.19 0 .289.1.251.274l-.076 1.318c-.095 1.04.01 1.507 1.085 1.653l1.18.236s.331.053.284.345l-.07.33a.29.29 0 0 1-.29.241l-1.155.147c-1.09.099-1.384-.015-1.743 1.313L7.9 11.03c-.024.174-.147.274-.337.274h-.46c-.189 0-.279-.1-.25-.274l.133-1.616c.057-1.034-.313-1.185-1.217-1.308l-1.019-.17.005.005h-.002Z"></path><defs><linearGradient id="coinA${uid}" x1="3.56" x2="16.483" y1="-1.567" y2="29.355" gradientUnits="userSpaceOnUse"><stop stop-color="#F7B016"></stop><stop offset="1" stop-color="#310000"></stop></linearGradient><linearGradient id="coinB${uid}" x1="3.321" x2="25.312" y1="2.84" y2="24.549" gradientUnits="userSpaceOnUse"><stop offset="0.655" stop-color="#F7B016"></stop><stop offset="1" stop-color="#310000"></stop></linearGradient><linearGradient id="coinC${uid}" x1="14.393" x2="-17.887" y1="-33.321" y2="60.905" gradientUnits="userSpaceOnUse"><stop offset="0.418" stop-color="#F7B016"></stop><stop offset="1" stop-color="#310000"></stop></linearGradient><linearGradient id="coinD${uid}" x1="3.887" x2="16.441" y1="21.299" y2="-5.934" gradientUnits="userSpaceOnUse"><stop stop-color="#F7B016"></stop><stop offset="0.905" stop-color="#310000"></stop><stop offset="1" stop-color="#4D1903"></stop></linearGradient><linearGradient id="coinE${uid}" x1="0.37" x2="13.38" y1="26.283" y2="-9.138" gradientUnits="userSpaceOnUse"><stop stop-color="#F7B016"></stop><stop offset="1" stop-color="#310000"></stop><stop offset="1" stop-color="#6B3406"></stop></linearGradient></defs></svg>`;
    }

    const BATTLE_SVG = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16" style="display:block;flex-shrink:0;color:var(--goldLight);"><path d="M9.6 2.2h.8L11.6 1l2.8-.4-.4 2.8-1.2 1.2v.8l-1.566 1.634L12.8 8.6l-3.2 3.2-6.4-6.4v-.8L2 3.4 1.6.6l2.8.4 1.2 1.2h.8l1.634 1.634zm4.8 8-3.2 3.2 1.6 1.6 3.2-3.2zm-7.864 1.464-3.2-3.2L0 11.8 3.2 15z"></path></svg>`;

    // Horizontal reel: cards scroll left and decelerate, landing with the final
    // card centered under the ticker line. ITEM_W must match .reel-item width in CSS.
    const ITEM_W = 116;
    function spinReel(trackEl, reelEl, pool, finalLabel, duration, renderItem){
      const FILLER = 38;        // cards before the winner
      const FILLER_AFTER = 16;  // cards after the winner so the belt never shows an end
      const items = [];
      for(let i=0;i<FILLER;i++) items.push(pool[randomIndex(pool.length)]);
      items.push(finalLabel);
      const finalIdx = items.length - 1;
      for(let i=0;i<FILLER_AFTER;i++) items.push(pool[randomIndex(pool.length)]);
      trackEl.innerHTML = items.map((t, idx) => renderItem(t, idx === finalIdx, idx)).join("");

      stopIdle(trackEl);
      trackEl.style.transition = "none";
      trackEl.style.transform = "translateX(0px)";
      void trackEl.offsetHeight;

      const viewport = reelEl.clientWidth;
      const jitter = Math.round((randomFloat() - 0.5) * ITEM_W * 0.55); // land slightly off dead-center
      const finalCenter = finalIdx * ITEM_W + ITEM_W / 2;
      const targetX = (viewport / 2) - finalCenter + jitter;

      requestAnimationFrame(() => {
        trackEl.style.transition = `transform ${duration}ms cubic-bezier(.12,.68,.18,1)`;
        trackEl.style.transform = `translateX(${targetX}px)`;
      });
    }

    // Idle: reels gently scroll in a seamless loop whenever they're not mid-roll,
    // so the belt never shows a visible "end".
    const IDLE_TILE = 18;   // cards per repeating tile
    const IDLE_SPEED = 70;  // px per second
    function stopIdle(trackEl){
      if(trackEl._idleAnim){ trackEl._idleAnim.cancel(); trackEl._idleAnim = null; }
    }
    function fillIdle(trackEl, pool, renderItem){
      if(!pool || !pool.length) return;
      stopIdle(trackEl);
      const tile = [];
      for(let i=0;i<IDLE_TILE;i++) tile.push(pool[randomIndex(pool.length)]);
      const doubled = tile.concat(tile); // two identical tiles → seamless wrap
      trackEl.innerHTML = doubled.map((t, idx) => renderItem(t, false, idx)).join("");
      trackEl.style.transition = "none";
      trackEl.style.transform = "translateX(0px)";
      const dist = IDLE_TILE * ITEM_W;
      // Web Animations API is reliable (keyframe var() isn't), and cleanly cancellable.
      trackEl._idleAnim = trackEl.animate(
        [{ transform: "translateX(0px)" }, { transform: `translateX(-${dist}px)` }],
        { duration: (dist / IDLE_SPEED) * 1000, iterations: Infinity, easing: "linear" }
      );
    }
    function idleReels(){
      fillIdle(document.getElementById("prizeTrack"), PRIZE_DISPLAY_POOL, renderPrizeCard);
      fillIdle(document.getElementById("winnerTrack"), currentEntries, renderWinnerCard);
    }

    function flashLanded(reelEl){
      reelEl.classList.remove("landed");
      void reelEl.offsetWidth;
      reelEl.classList.add("landed");
    }

    // ---- win modal ----
    function hideModal(){
      document.getElementById("resultModal").classList.remove("show");
      idleReels(); // resume the continuous loop
    }
    async function showResultModal(winner, prizeLabel){
      const av = avatarFor(winner);
      document.getElementById("modalAvatar").innerHTML =
        `<div class="avatar-circle" style="background:hsl(${av.hue},55%,42%);">${av.emoji}</div>`;
      document.getElementById("modalWinner").textContent = winner;

      const isCoins = /Coins/.test(prizeLabel);
      const isBattle = prizeLabel === "Battle Call";
      document.getElementById("modalPrize").innerHTML =
        `<span class="prize-icon">${isCoins ? coinSvg("m") : isBattle ? BATTLE_SVG : ""}</span><span>${prizeLabel}</span>`;

      const battleEl = document.getElementById("modalBattle");
      const gridEl = document.getElementById("modalBattleGrid");
      const metaEl = document.getElementById("modalBattleMeta");
      const namesEl = document.getElementById("modalBattleNames");
      battleEl.style.display = "none";
      gridEl.innerHTML = ""; metaEl.textContent = ""; namesEl.textContent = "";

      document.getElementById("resultModal").classList.add("show");

      if(!isBattle || !winner) return;

      // Battle Call — pull and show the winner's submitted battle.
      battleEl.style.display = "block";
      metaEl.textContent = "Loading their battle...";
      try{
        const suffix = winner.replace(/^RN-/, "");
        const snap = await getDoc(doc(db, "entries", suffix));
        const data = snap.exists() ? snap.data() : null;
        if(data && Array.isArray(data.cases) && data.cases.length){
          const extras = [
            data.jackpot ? "Jackpot" : null,
            data.terminal ? "Terminal" : null,
            data.borrowPercent ? `Borrow ${data.borrowPercent}% (paid ${data.payAmount})` : null
          ].filter(Boolean).join(" + ");
          metaEl.textContent = `${data.battleSize || ""} ${data.baseMode || ""}${extras ? " + " + extras : ""} — total ${data.total} coins`;
          namesEl.textContent = data.cases.join(", ");
          gridEl.innerHTML = data.cases.map(name => {
            const file = ICON_FILES[name];
            return `<div class="battle-case-card">${file ? `<img src="icons/${encodeURIComponent(file)}" alt="">` : name}</div>`;
          }).join("");
        } else {
          metaEl.textContent = "This user hasn't submitted a battle yet.";
        }
      } catch(err){
        metaEl.textContent = "Couldn't load their battle picks.";
      }
    }

    // Timing: winner spins first; the prize reel starts ~2s later while the winner
    // is still spinning; the modal reveals once both have landed.
    const WINNER_SPIN_MS = 3400;
    const PRIZE_SPIN_MS  = 3400;
    const PRIZE_DELAY_MS = 2000;
    let rolling = false;

    function rollBoth(){
      if(rolling || currentEntries.length === 0) return;
      rolling = true;
      const rollBtn = document.getElementById("rollBtn");
      rollBtn.disabled = true;
      hideModal();

      const winner = currentEntries[randomIndex(currentEntries.length)];
      currentWinner = winner;
      winnerLogged = false;
      const prize = pickWeightedPrize();

      // Winner reel spins immediately.
      spinReel(
        document.getElementById("winnerTrack"),
        document.getElementById("winnerReel"),
        currentEntries, winner, WINNER_SPIN_MS, renderWinnerCard
      );
      setTimeout(() => flashLanded(document.getElementById("winnerReel")), WINNER_SPIN_MS + 120);

      // Prize reel joins in a couple seconds later, while the winner is still spinning.
      setTimeout(() => {
        spinReel(
          document.getElementById("prizeTrack"),
          document.getElementById("prizeReel"),
          PRIZE_DISPLAY_POOL, prize.label, PRIZE_SPIN_MS, renderPrizeCard
        );
        setTimeout(() => flashLanded(document.getElementById("prizeReel")), PRIZE_SPIN_MS + 120);
      }, PRIZE_DELAY_MS);

      // Both landed → log + reveal modal.
      const totalMs = PRIZE_DELAY_MS + PRIZE_SPIN_MS + 450;
      setTimeout(() => {
        rolling = false;
        rollBtn.disabled = currentEntries.length === 0;
        if(currentWinner && !winnerLogged){
          winnerLogged = true;
          addHistory({ rainId: currentWinner, prize: prize.label, ts: Date.now() });
        }
        showResultModal(winner, prize.label);
      }, totalMs);
    }

  }
</script>
