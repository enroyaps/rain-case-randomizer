<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Draw Host</title>
<style>
  :root{
    --bg:#060309; --panel:#140b22; --panel2:#0d0716; --border:#2d1c46;
    --gold:#9b5cff; --goldLight:#cba3ff; --cyan:#34e0ff; --text:#f1ecfb; --muted:#a99bd1;
    --err:#f4433f; --ok:#4ade80;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    background:radial-gradient(circle at top,#2a1345,var(--bg) 60%);
    color:var(--text); min-height:100vh; padding:24px;
  }
  .wrap{max-width:720px;margin:0 auto;}
  .center-card{
    max-width:400px;margin:80px auto;background:var(--panel);border:1px solid var(--border);
    border-radius:16px;padding:32px;text-align:center;
  }
  h1{font-size:1.3rem;margin:0 0 20px;color:var(--cyan);}
  h2{font-size:1.05rem;margin:0 0 14px;color:var(--cyan);}
  input, textarea{
    width:100%;background:var(--panel2);border:1px solid var(--border);color:var(--text);
    border-radius:8px;padding:10px 12px;font-size:0.9rem;margin-bottom:10px;font-family:inherit;
  }
  textarea{min-height:90px;resize:vertical;}
  button{
    background:linear-gradient(180deg,var(--goldLight),var(--gold));color:#fbf7ff;
    border:none;font-weight:800;padding:12px 20px;border-radius:10px;font-size:0.92rem;cursor:pointer;
    letter-spacing:.03em;
  }
  button:hover:not(:disabled){filter:brightness(1.08);}
  button:disabled{opacity:0.45;cursor:default;}
  button.secondary{background:transparent;color:var(--gold);border:1px solid var(--gold);}
  .status{margin-top:8px;font-size:0.85rem;min-height:1.2em;}
  .status.ok{color:var(--ok);} .status.err{color:var(--err);} .status.muted{color:var(--muted);}
  .panel{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:20px;}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;color:var(--muted);font-size:0.85rem;}
  .blur-toggle{filter:blur(6px);transition:filter .15s ease;cursor:pointer;}
  .blur-toggle:hover{filter:blur(0);}
  .signout-dock{display:flex;justify-content:center;margin-top:32px;padding-top:16px;border-top:1px solid var(--border);}
  .signout-dock button{opacity:0.6;font-size:0.8rem;padding:8px 16px;}
  .signout-dock button:hover{opacity:1;}
  .wl-status-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
  .wl-chip{
    display:flex;align-items:center;gap:6px;border:1px solid var(--border);
    padding:6px 12px;border-radius:20px;font-size:0.82rem;background:var(--panel2);
  }
  .wl-chip.done{border-color:var(--ok);color:var(--ok);}
  .wl-chip.pending{border-color:var(--err);color:var(--err);}
  .reel{
    width:280px;max-width:100%;height:64px;overflow:hidden;border:2px solid var(--border);border-radius:10px;
    background:var(--panel2);position:relative;margin:0 auto 14px;
  }
  #rollWinnerBtn, #rollPrizeBtn{display:block;margin:0 auto;}
  .reel::after{
    content:"";position:absolute;inset:0;
    box-shadow:inset 0 12px 12px -10px #000, inset 0 -12px 12px -10px #000;
    pointer-events:none;border-radius:8px;
  }
  .reel-track{display:flex;flex-direction:column;}
  .reel-item{height:64px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.1rem;}
  .reel-item.avatar-item{flex-direction:column;gap:2px;}
  .avatar-circle{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.15rem;flex-shrink:0;}
  .avatar-id{font-size:0.68rem;font-weight:700;color:var(--goldLight);}
  .reel-item.prize-item{gap:8px;}
  @keyframes reelLandPulse{
    0%{box-shadow:0 0 0 0 rgba(155,92,255,.65);}
    70%{box-shadow:0 0 0 16px rgba(155,92,255,0);}
    100%{box-shadow:0 0 0 0 rgba(155,92,255,0);}
  }
  @keyframes reelLandBounce{
    0%{transform:scale(1);} 45%{transform:scale(1.045);} 100%{transform:scale(1);}
  }
  .reel.landed{animation:reelLandPulse .65s ease-out, reelLandBounce .4s ease-out;}
  .result-box{
    margin-top:18px;background:var(--panel2);border:1px solid var(--border);border-radius:10px;
    padding:16px;text-align:center;
  }
  .result-box .label{color:var(--muted);font-size:0.78rem;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;}
  .result-box .value{font-size:1.2rem;font-weight:800;color:var(--goldLight);}
  .result-box a{display:inline-block;margin-top:12px;color:var(--cyan);font-weight:700;text-decoration:none;}
  .battle-cases-grid{display:flex;flex-wrap:wrap;gap:12px;}
  .battle-case-card{
    width:130px;height:150px;border:2px solid var(--border);border-radius:12px;overflow:hidden;
    background:var(--panel);
  }
  .battle-case-card img{width:100%;height:100%;object-fit:contain;display:block;}
  .setup-warning{
    background:#2c1a12;border:1px solid #6b4a1a;color:#f4c778;padding:14px;border-radius:10px;
    font-size:0.82rem;text-align:left;line-height:1.5;max-width:400px;margin:80px auto;
  }
</style>
</head>
<body>

  <div id="setupWarning" class="setup-warning" style="display:none;">
    Firebase isn't configured yet — fill in <code>firebase-config.js</code> first.
  </div>

  <div class="center-card" id="loginCard" style="display:none;">
    <h1>Host Login</h1>
    <input id="email" type="email" placeholder="Email" autocomplete="username">
    <input id="password" type="password" placeholder="Password" autocomplete="current-password">
    <button id="loginBtn" style="width:100%;">SIGN IN</button>
    <div id="loginStatus" class="status"></div>
  </div>

  <div class="wrap" id="dashboard" style="display:none;">
    <div class="topbar">
      <span>Signed in as <span id="whoami" class="blur-toggle"></span></span>
      <button class="secondary" id="toggleWhitelistBtn">Show Whitelist Editor</button>
    </div>

    <div class="panel" id="whitelistPanel" style="display:none;">
      <h2>Weekly Whitelist</h2>
      <textarea id="whitelistBox" placeholder="One Rain ID per line or comma-separated, e.g. 7JEU96GX"></textarea>
      <button id="saveWhitelistBtn">Save Whitelist</button>
      <div id="whitelistStatus" class="status"></div>

      <h2 style="margin-top:22px;">Battle Call Status (<span id="doneCount">0</span>/<span id="totalCount">0</span> done)</h2>
      <div id="whitelistStatusList" class="wl-status-list"></div>
    </div>

    <div class="panel">
      <h2>Round Controls</h2>
      <button class="secondary" id="resetRoundBtn">Reset Round (clears queue)</button>
      <div id="resetStatus" class="status"></div>
    </div>

    <div class="panel">
      <h2>Draw</h2>
      <div class="reel" id="winnerReel"><div class="reel-track" id="winnerTrack"></div></div>
      <button id="rollWinnerBtn">Roll Winner</button>

      <div class="reel" id="prizeReel" style="margin-top:20px;"><div class="reel-track" id="prizeTrack"></div></div>
      <button id="rollPrizeBtn" disabled>Roll Prize</button>

      <div id="resultBox" class="result-box" style="display:none;">
        <div class="label">Result</div>
        <div id="resultText" class="value"></div>
        <div id="battleCasesArea" style="display:none;margin-top:16px;text-align:left;">
          <div id="battleCasesNames" style="color:var(--text);font-size:0.95rem;font-weight:700;margin-bottom:6px;user-select:all;"></div>
          <div id="battleCasesMeta" style="color:var(--muted);font-size:0.85rem;margin-bottom:10px;"></div>
          <div id="battleCasesGrid" class="battle-cases-grid"></div>
        </div>
      </div>
    </div>

    <div class="signout-dock">
      <button class="secondary" id="signOutBtn">Sign out</button>
    </div>
  </div>

<script type="module">
  import { firebaseConfig, CONFIG_IS_SET } from "./firebase-config.js";
  import { ICON_FILES } from "./cases-data.js";

  if(!CONFIG_IS_SET){
    document.getElementById("setupWarning").style.display = "block";
  } else {
    const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js");
    const {
      getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut
    } = await import("https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js");
    const {
      getFirestore, doc, getDoc, setDoc, collection, onSnapshot, getDocs, deleteDoc
    } = await import("https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js");

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const loginCard = document.getElementById("loginCard");
    const dashboard = document.getElementById("dashboard");
    const loginStatus = document.getElementById("loginStatus");

    document.getElementById("loginBtn").addEventListener("click", async () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      loginStatus.textContent = "Signing in...";
      loginStatus.className = "status muted";
      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (err) {
        loginStatus.textContent = "Sign-in failed — check email/password.";
        loginStatus.className = "status err";
      }
    });

    document.getElementById("signOutBtn").addEventListener("click", () => signOut(auth));

    onAuthStateChanged(auth, (user) => {
      if (user) {
        loginCard.style.display = "none";
        dashboard.style.display = "block";
        document.getElementById("whoami").textContent = user.email;
        initDashboard();
      } else {
        loginCard.style.display = "block";
        dashboard.style.display = "none";
      }
    });

    let dashboardInitialized = false;
    let currentEntries = [];
    let currentWinner = null;
    let currentWhitelist = [];
    let submittedSuffixes = new Set();

    function renderWhitelistStatus(){
      const done = currentWhitelist.filter(id => submittedSuffixes.has(id)).length;
      document.getElementById("doneCount").textContent = done;
      document.getElementById("totalCount").textContent = currentWhitelist.length;
      const listEl = document.getElementById("whitelistStatusList");
      listEl.innerHTML = currentWhitelist.map(id => {
        const isDone = submittedSuffixes.has(id);
        return `<div class="wl-chip ${isDone ? "done" : "pending"}">${isDone ? "&#10003;" : "&#10007;"} RN-${id}</div>`;
      }).join("") || `<span style="color:var(--muted);font-size:0.85rem;">No whitelist loaded yet.</span>`;
    }

    function initDashboard(){
      if(dashboardInitialized) return;
      dashboardInitialized = true;

      const whitelistPanel = document.getElementById("whitelistPanel");
      const toggleBtn = document.getElementById("toggleWhitelistBtn");
      toggleBtn.addEventListener("click", () => {
        const showing = whitelistPanel.style.display !== "none";
        whitelistPanel.style.display = showing ? "none" : "block";
        toggleBtn.textContent = showing ? "Show Whitelist Editor" : "Hide Whitelist Editor";
      });

      // Load current whitelist into the textarea + status tracker
      getDoc(doc(db, "whitelist", "current")).then(snap => {
        if(snap.exists()){
          currentWhitelist = snap.data().ids || [];
          document.getElementById("whitelistBox").value = currentWhitelist.join("\n");
          renderWhitelistStatus();
        }
      });

      document.getElementById("saveWhitelistBtn").addEventListener("click", async () => {
        const raw = document.getElementById("whitelistBox").value;
        const ids = [...new Set(
          raw.split(/[\n,]/).map(s => s.trim().toUpperCase().replace(/^RN-?/, "")).filter(Boolean)
        )];
        const statusEl = document.getElementById("whitelistStatus");
        try{
          await setDoc(doc(db, "whitelist", "current"), { ids });
          statusEl.textContent = `Saved ${ids.length} IDs.`;
          statusEl.className = "status ok";
          currentWhitelist = ids;
          renderWhitelistStatus();
        } catch(err){
          statusEl.textContent = "Failed to save — try again.";
          statusEl.className = "status err";
        }
      });

      // Track submitted entries in the background (no visible feed) so Roll Winner has a pool to draw from.
      // A doc only counts as "done" if it actually has cases — mid-edit (Change Battle) docs
      // are cleared to cases:[] so they correctly show as pending here and aren't rollable yet.
      onSnapshot(collection(db, "entries"), (snapshot) => {
        const completedDocs = snapshot.docs.filter(d => Array.isArray(d.data().cases) && d.data().cases.length > 0);
        currentEntries = completedDocs.map(d => d.data().rainId);
        submittedSuffixes = new Set(completedDocs.map(d => d.id));
        document.getElementById("rollWinnerBtn").disabled = currentEntries.length === 0;
        renderWhitelistStatus();
      });

      document.getElementById("resetRoundBtn").addEventListener("click", async () => {
        const statusEl = document.getElementById("resetStatus");
        statusEl.textContent = "Clearing...";
        statusEl.className = "status muted";
        const snap = await getDocs(collection(db, "entries"));
        await Promise.all(snap.docs.map(d => deleteDoc(d.ref)));
        currentWinner = null;
        document.getElementById("resultBox").style.display = "none";
        document.getElementById("rollPrizeBtn").disabled = true;
        statusEl.textContent = "Queue cleared.";
        statusEl.className = "status ok";
      });

      document.getElementById("rollWinnerBtn").addEventListener("click", rollWinner);
      document.getElementById("rollPrizeBtn").addEventListener("click", rollPrize);
    }

    // --- secure randomness helpers ---
    function randomIndex(n){
      const buf = new Uint32Array(1);
      crypto.getRandomValues(buf);
      return buf[0] % n;
    }
    function randomFloat(){
      const buf = new Uint32Array(1);
      crypto.getRandomValues(buf);
      return buf[0] / (0xFFFFFFFF + 1);
    }
    const PRIZES = [
      { label: "5 Coins", weight: 50 },
      { label: "10 Coins", weight: 20 },
      { label: "Battle Call", weight: 20 },
      { label: "25 Coins", weight: 8 },
      { label: "Cases", weight: 2 },
    ];
    function pickWeightedPrize(){
      const total = PRIZES.reduce((s,p) => s + p.weight, 0);
      let r = randomFloat() * total;
      for(const p of PRIZES){
        if(r < p.weight) return p;
        r -= p.weight;
      }
      return PRIZES[PRIZES.length - 1];
    }

    const AVATAR_EMOJIS = ["🐸","🦄","🐙","🎃","👻","🦊","🐵","🐺","🦁","🐯","🐨","🐼","🦝","🐲","🥷","🤡","👾","🧌","🦖","🐷","🐔","🐶","🐱","🦉","🐹","🐰"];

    // Deterministic per-person avatar: same Rain ID always gets the same emoji + color,
    // but nobody picks it themselves.
    function avatarFor(rainId){
      const suffix = rainId.replace(/^RN-/, "");
      let hash = 0;
      for(let i = 0; i < suffix.length; i++) hash = (hash * 31 + suffix.charCodeAt(i)) >>> 0;
      return { emoji: AVATAR_EMOJIS[hash % AVATAR_EMOJIS.length], hue: hash % 360 };
    }

    function coinSvg(uid){
      return `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 16 16" style="display:block;flex-shrink:0;"><path fill="url(#coinA${uid})" d="M15.907 7.433c-.587-3.567-3.904-6.3-7.907-6.3S.68 3.867.093 7.434H0v1.134C0 12.672 3.582 16 8 16s8-3.328 8-7.433V7.433z"></path><path fill="url(#coinB${uid})" d="M8 14.866c4.418 0 8-3.328 8-7.433S12.418 0 8 0 0 3.328 0 7.433s3.582 7.433 8 7.433"></path><path fill="url(#coinC${uid})" d="M8 13.372c3.53 0 6.392-2.66 6.392-5.939 0-3.28-2.862-5.939-6.392-5.939-3.53 0-6.392 2.66-6.392 5.94 0 3.279 2.862 5.938 6.392 5.938"></path><path fill="url(#coinD${uid})" d="M8 2.116c3.418 0 6.21 2.492 6.383 5.628.006-.103.009-.207.009-.31 0-3.28-2.862-5.94-6.392-5.94-3.53 0-6.392 2.66-6.392 5.94 0 .103.003.207.01.31C1.79 4.608 4.581 2.116 8 2.116"></path><path fill="url(#coinE${uid})" d="M4.754 7.943c-.213-.029-.417-.222-.374-.44l.047-.203a.505.505 0 0 1 .053-.151c.061-.1.156-.147.293-.16l1.085-.161c1.87-.138 1.672-1.044 1.946-1.744l.432-1.294c.038-.175.146-.274.336-.274H8.9c.19 0 .289.1.251.274l-.076 1.318c-.095 1.04.01 1.507 1.085 1.653l1.18.236s.331.053.284.345l-.07.33a.29.29 0 0 1-.29.241l-1.155.147c-1.09.099-1.384-.015-1.743 1.313L7.9 11.03c-.024.174-.147.274-.337.274h-.46c-.189 0-.279-.1-.25-.274l.133-1.616c.057-1.034-.313-1.185-1.217-1.308l-1.019-.17.005.005h-.002Z"></path><defs><linearGradient id="coinA${uid}" x1="3.56" x2="16.483" y1="-1.567" y2="29.355" gradientUnits="userSpaceOnUse"><stop stop-color="#F7B016"></stop><stop offset="1" stop-color="#310000"></stop></linearGradient><linearGradient id="coinB${uid}" x1="3.321" x2="25.312" y1="2.84" y2="24.549" gradientUnits="userSpaceOnUse"><stop offset="0.655" stop-color="#F7B016"></stop><stop offset="1" stop-color="#310000"></stop></linearGradient><linearGradient id="coinC${uid}" x1="14.393" x2="-17.887" y1="-33.321" y2="60.905" gradientUnits="userSpaceOnUse"><stop offset="0.418" stop-color="#F7B016"></stop><stop offset="1" stop-color="#310000"></stop></linearGradient><linearGradient id="coinD${uid}" x1="3.887" x2="16.441" y1="21.299" y2="-5.934" gradientUnits="userSpaceOnUse"><stop stop-color="#F7B016"></stop><stop offset="0.905" stop-color="#310000"></stop><stop offset="1" stop-color="#4D1903"></stop></linearGradient><linearGradient id="coinE${uid}" x1="0.37" x2="13.38" y1="26.283" y2="-9.138" gradientUnits="userSpaceOnUse"><stop stop-color="#F7B016"></stop><stop offset="1" stop-color="#310000"></stop><stop offset="1" stop-color="#6B3406"></stop></linearGradient></defs></svg>`;
    }

    const BATTLE_SVG = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16" style="display:block;flex-shrink:0;color:var(--goldLight);"><path d="M9.6 2.2h.8L11.6 1l2.8-.4-.4 2.8-1.2 1.2v.8l-1.566 1.634L12.8 8.6l-3.2 3.2-6.4-6.4v-.8L2 3.4 1.6.6l2.8.4 1.2 1.2h.8l1.634 1.634zm4.8 8-3.2 3.2 1.6 1.6 3.2-3.2zm-7.864 1.464-3.2-3.2L0 11.8 3.2 15z"></path></svg>`;

    function spinReel(trackEl, fillerItems, finalLabel, itemHeight, duration, renderItem){
      const items = [];
      for(let i=0;i<14;i++) items.push(fillerItems[randomIndex(fillerItems.length)]);
      items.push(finalLabel);
      const render = renderItem || (t => `<div class="reel-item">${t}</div>`);
      trackEl.innerHTML = items.map((t, idx) => render(t, idx === items.length - 1, idx)).join("");
      trackEl.style.transition = "none";
      trackEl.style.transform = "translateY(0px)";
      void trackEl.offsetHeight;
      requestAnimationFrame(() => {
        trackEl.style.transition = `transform ${duration}ms cubic-bezier(.14,.66,.2,1)`;
        trackEl.style.transform = `translateY(-${itemHeight * (items.length - 1)}px)`;
      });
    }

    function flashLanded(reelEl){
      reelEl.classList.remove("landed");
      void reelEl.offsetWidth;
      reelEl.classList.add("landed");
    }

    function rollWinner(){
      if(currentEntries.length === 0) return;
      document.getElementById("rollWinnerBtn").disabled = true;
      document.getElementById("resultBox").style.display = "none";
      const winner = currentEntries[randomIndex(currentEntries.length)];
      currentWinner = winner;
      spinReel(document.getElementById("winnerTrack"), currentEntries, winner, 64, 1400, (rainId, isFinal) => {
        const av = avatarFor(rainId);
        return `<div class="reel-item avatar-item">
          <div class="avatar-circle" style="background:hsl(${av.hue},55%,42%);">${av.emoji}</div>
          ${isFinal ? `<div class="avatar-id">${rainId}</div>` : ""}
        </div>`;
      });
      setTimeout(() => {
        document.getElementById("rollWinnerBtn").disabled = false;
        document.getElementById("rollPrizeBtn").disabled = false;
        flashLanded(document.getElementById("winnerReel"));
      }, 1550);
    }

    function rollPrize(){
      document.getElementById("rollPrizeBtn").disabled = true;
      const prize = pickWeightedPrize();
      spinReel(document.getElementById("prizeTrack"), PRIZES.map(p => p.label), prize.label, 64, 1400, (label, isFinal, idx) => {
        const isCoins = /Coins/.test(label);
        const isBattle = label === "Battle Call";
        return `<div class="reel-item prize-item">
          ${isCoins ? coinSvg("p" + idx) : ""}
          ${isBattle ? BATTLE_SVG : ""}
          <span>${label}</span>
        </div>`;
      });

      const casesArea = document.getElementById("battleCasesArea");
      const casesGrid = document.getElementById("battleCasesGrid");
      const casesMeta = document.getElementById("battleCasesMeta");
      const casesNames = document.getElementById("battleCasesNames");
      casesArea.style.display = "none";
      casesGrid.innerHTML = "";
      casesMeta.textContent = "";
      casesNames.textContent = "";

      setTimeout(async () => {
        document.getElementById("rollPrizeBtn").disabled = false;
        flashLanded(document.getElementById("prizeReel"));
        const resultBox = document.getElementById("resultBox");
        document.getElementById("resultText").textContent = `${currentWinner || "?"} — ${prize.label}`;
        resultBox.style.display = "block";

        if(prize.label !== "Battle Call" || !currentWinner) return;

        const suffix = currentWinner.replace(/^RN-/, "");
        casesArea.style.display = "block";
        casesMeta.textContent = "Loading their battle...";
        try{
          const snap = await getDoc(doc(db, "entries", suffix));
          const data = snap.exists() ? snap.data() : null;
          if(data && Array.isArray(data.cases) && data.cases.length){
            const extras = [
              data.jackpot ? "Jackpot" : null,
              data.terminal ? "Terminal" : null,
              data.borrowPercent ? `Borrow ${data.borrowPercent}% (paid ${data.payAmount})` : null
            ].filter(Boolean).join(" + ");
            casesMeta.textContent = `${data.battleSize || ""} ${data.baseMode || ""}${extras ? " + " + extras : ""} — total ${data.total} coins`;
            casesNames.textContent = data.cases.join(", ");
            casesGrid.innerHTML = data.cases.map(name => {
              const file = ICON_FILES[name];
              return `<div class="battle-case-card">${file ? `<img src="icons/${encodeURIComponent(file)}" alt="">` : name}</div>`;
            }).join("");
          } else {
            casesMeta.textContent = "This user hasn't submitted a battle yet.";
          }
        } catch(err){
          casesMeta.textContent = "Couldn't load their battle picks.";
        }
      }, 1550);
    }
  }
